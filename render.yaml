services:
  # Backend (FastAPI)
  - type: web
    name: unstructured-backend
    env: python
    rootDir: .
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"

  # Frontend (separate service)
  # NOTE:
  # - If your frontend is React/Vite/Next in a different folder, update rootDir/build/staticPublishPath.
  # - If your current UI is only Jinja templates in this backend, you do not need this service.
  - type: static
    name: unstructured-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

